<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Tower | Admin Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #fff; }</style>
</head>
<body class="antialiased text-gray-900">

    <script>
        // CONFIGURAÇÃO OFICIAL SUPABASE DO NICOLAS
        const SUPABASE_URL = 'https://nhefdhzxzeddwjkzremz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oZWZkaHp4emVkZHdqa3pyZW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5OTY0NTgsImV4cCI6MjA5MjU3MjQ1OH0.trb1SIXCmTCXwXfyne4k8AZN7CGnbhphEW-tADUVd7U';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function checkPIN() {
            const input = document.getElementById('pin-input').value;
            if (btoa(input) === 'MTIzNA==') { 
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    loadProductsFromCloud();
                }, 500);
            } else {
                document.getElementById('pin-error').classList.remove('hidden');
            }
        }
    </script>

    <div id="login-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <h1 class="text-xl font-bold tracking-widest uppercase mb-8">Control Tower</h1>
        <input type="password" id="pin-input" placeholder="PIN" class="border border-gray-300 px-4 py-2 text-center tracking-[0.5em] focus:border-black outline-none rounded-lg mb-4 w-48">
        <button onclick="checkPIN()" class="bg-black text-white px-8 py-2 text-xs font-bold uppercase tracking-widest rounded-lg hover:bg-gray-800">Entrar</button>
        <p id="pin-error" class="text-red-500 text-xs mt-4 hidden">Acesso Negado.</p>
    </div>

    <header class="border-b border-gray-100 sticky top-0 z-30 bg-white">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <h1 class="text-sm font-semibold tracking-widest uppercase">The Control Tower <span class="ml-2 text-[8px] bg-green-100 text-green-600 px-2 py-0.5 rounded">Nuvem Online</span></h1>
            <a href="index.html" class="text-xs font-medium uppercase text-gray-500 hover:text-black">Abrir Loja ↗</a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-12">
        <div class="bg-gray-50 p-8 rounded-xl mb-12 border border-gray-200 shadow-sm">
            <h2 id="form-title" class="text-xs font-bold uppercase tracking-widest text-gray-800 mb-6">Cadastrar Peça na Nuvem</h2>
            
            <form id="product-form" onsubmit="saveProduct(event)" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-start">
                    <div class="md:col-span-2">
                        <label class="block text-xs text-gray-500 mb-2">Nome do Produto *</label>
                        <input type="text" id="p-name" required class="w-full border border-gray-200 px-4 py-2 text-sm focus:border-black outline-none rounded-lg">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-2">Setor *</label>
                        <select id="p-sector" required class="w-full border border-gray-200 px-4 py-2 text-sm focus:border-black outline-none bg-white rounded-lg">
                            <option value="Adulto">Adulto</option>
                            <option value="Infantil">Infantil</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-2">Preço (R$) *</label>
                        <input type="number" id="p-price" step="0.01" required class="w-full border border-gray-200 px-4 py-2 text-sm focus:border-black outline-none rounded-lg">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs text-gray-500 mb-2">Categoria *</label>
                        <input type="text" id="p-category" required class="w-full border border-gray-200 px-4 py-2 text-sm focus:border-black outline-none rounded-lg">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs text-gray-500 mb-2">Etiqueta</label>
                        <select id="p-tag" class="w-full border border-gray-200 px-4 py-2 text-sm focus:border-black outline-none bg-white rounded-lg">
                            <option value="">Nenhuma</option>
                            <option value="Novo">Novo</option>
                            <option value="Promoção">Promoção</option>
                            <option value="Mais Vendido">Mais Vendido</option>
                        </select>
                    </div>
                    <div class="md:col-span-4">
                        <label class="block text-xs text-gray-500 mb-2">Descrição</label>
                        <textarea id="p-desc" rows="3" class="w-full border border-gray-200 px-4 py-2 text-sm focus:border-black outline-none rounded-lg resize-none"></textarea>
                    </div>
                </div>
                
                <div class="border-t pt-6">
                    <div class="flex justify-between items-center mb-4">
                        <label class="text-xs font-bold uppercase tracking-widest">Cores e Estoque</label>
                        <button type="button" onclick="addVariantBlock()" class="text-[10px] border border-black px-3 py-1 rounded hover:bg-black hover:text-white transition-colors">+ Adicionar Cor</button>
                    </div>
                    <div id="variants-container" class="space-y-4"></div>
                </div>

                <div class="mt-8 pt-6 border-t">
                    <button id="btn-submit" type="submit" class="w-full bg-black text-white py-4 text-sm font-bold uppercase tracking-widest rounded-lg hover:bg-gray-800 transition-all">Sincronizar com Nuvem</button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="py-4 pl-4 text-xs font-semibold uppercase text-gray-500">Produto</th>
                        <th class="py-4 text-xs font-semibold uppercase text-gray-500 text-right pr-4">Ações</th>
                    </tr>
                </thead>
                <tbody id="admin-table" class="divide-y"></tbody>
            </table>
        </div>
    </main>

    <script>
        let products = [];
        let editingId = null;

        async function loadProductsFromCloud() {
            const { data, error } = await _supabase.from('produtos').select('*').order('created_at', { ascending: false });
            if (error) return console.error(error);
            products = data;
            renderTable();
        }

        async function saveProduct(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "Salvando na Nuvem...";

            const variantBlocks = document.querySelectorAll('.variant-block');
            let processedVariants = [];

            for (let block of variantBlocks) {
                const color = block.querySelector('.v-color').value;
                const fileInput = block.querySelector('.v-image');
                const existingImg = block.querySelector('.v-existing-image-data').value;
                
                let imageBase64 = existingImg;
                if (fileInput.files.length > 0) imageBase64 = await processImage(fileInput.files[0]);

                const sizes = {};
                block.querySelectorAll('.size-row').forEach(row => {
                    const name = row.querySelector('.v-size-name').value;
                    const qty = parseInt(row.querySelector('.v-size-qty').value);
                    if (name) sizes[name] = qty;
                });
                processedVariants.push({ id: crypto.randomUUID(), color, image: imageBase64, sizes });
            }

            const pData = {
                name: document.getElementById('p-name').value,
                sector: document.getElementById('p-sector').value,
                category: document.getElementById('p-category').value,
                description: document.getElementById('p-desc').value,
                price: parseFloat(document.getElementById('p-price').value),
                tag: document.getElementById('p-tag').value,
                variants: processedVariants
            };

            let res;
            if (editingId) {
                res = await _supabase.from('produtos').update(pData).eq('id', editingId);
            } else {
                res = await _supabase.from('produtos').insert([pData]);
            }

            if (res.error) alert("Erro ao salvar: " + res.error.message);
            else resetForm(), loadProductsFromCloud();
            
            btn.disabled = false; btn.innerText = "Sincronizar com Nuvem";
        }

        async function deleteProduct(id) {
            if(!confirm("Remover da nuvem permanentemente?")) return;
            await _supabase.from('produtos').delete().eq('id', id);
            loadProductsFromCloud();
        }

        function addVariantBlock(data = null) {
            const block = document.createElement('div');
            block.className = 'variant-block bg-white border p-4 rounded-lg relative shadow-sm';
            block.innerHTML = `
                <button type="button" onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-red-500 text-[10px] font-bold">✕ REMOVER</button>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <input type="text" value="${data?data.color:''}" placeholder="Ex: Azul Royal" class="v-color w-full border p-2 text-sm mb-2 rounded outline-none">
                        <input type="file" class="v-image text-[10px] mb-2">
                        <input type="hidden" class="v-existing-image-data" value="${data?data.image:''}">
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-bold uppercase">Tamanhos</span>
                            <button type="button" onclick="addSizeRow(this)" class="text-[10px] text-blue-500">+ ADICIONAR TAM</button>
                        </div>
                        <div class="v-sizes-container"></div>
                    </div>
                </div>
            `;
            document.getElementById('variants-container').appendChild(block);
            if(data) Object.entries(data.sizes).forEach(([s, q]) => addSizeRow(block.querySelector('.v-sizes-container'), s, q));
            else addSizeRow(block.querySelector('.v-sizes-container'));
        }

        function addSizeRow(btn, s='', q=0) {
            const container = btn.tagName === 'BUTTON' ? btn.parentElement.nextElementSibling : btn;
            const div = document.createElement('div');
            div.className = 'flex gap-2 size-row mb-1';
            div.innerHTML = `
                <input type="text" value="${s}" placeholder="P" class="v-size-name w-1/2 border p-1 rounded text-[10px]">
                <input type="number" value="${q}" class="v-size-qty w-1/4 border p-1 rounded text-[10px]">
                <button type="button" onclick="this.parentElement.remove()" class="text-red-300 hover:text-red-500">✕</button>
            `;
            container.appendChild(div);
        }

        async function processImage(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const scale = 800 / img.width;
                        canvas.width = 800; canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/webp', 0.8));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function editProduct(id) {
            const p = products.find(prod => prod.id == id);
            editingId = id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-sector').value = p.sector;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-category').value = p.category || '';
            document.getElementById('p-tag').value = p.tag || '';
            document.getElementById('p-desc').value = p.description || '';
            document.getElementById('variants-container').innerHTML = '';
            p.variants.forEach(v => addVariantBlock(v));
            document.getElementById('form-title').innerText = "Editando Peça...";
            document.getElementById('btn-submit').innerText = "Salvar Alterações";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function resetForm() { 
            document.getElementById('product-form').reset(); 
            document.getElementById('variants-container').innerHTML = ''; 
            editingId = null; 
            document.getElementById('form-title').innerText = "Cadastrar Peça na Nuvem";
            addVariantBlock(); 
        }

        function renderTable() {
            document.getElementById('admin-table').innerHTML = products.map(p => `
                <tr class="text-xs">
                    <td class="p-4 font-bold uppercase">${p.name}</td>
                    <td class="p-4 text-right">
                        <button onclick="editProduct('${p.id}')" class="text-blue-500 font-bold mr-4 uppercase">Editar</button>
                        <button onclick="deleteProduct('${p.id}')" class="text-red-400 uppercase">Deletar</button>
                    </td>
                </tr>`).join('');
        }
        addVariantBlock();
    </script>
</body>
</html>
