<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOJA | Modelo Mestre</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        ::-webkit-scrollbar { display: none; }
        /* Removida a trava de cor do Tailwind para evitar conflitos no Mobile */
        body { font-family: 'Inter', sans-serif; background-color: #fdfdfd; color: #111; transition: background 0.8s ease, color 0.8s ease; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .font-serif-luxury { font-family: 'Playfair Display', serif; }
        .font-kids { font-family: 'Quicksand', sans-serif; }
        
        /* MODO ESCURO AUTOMÁTICO REFINADO */
        @media (prefers-color-scheme: dark) {
            body { background-color: #121212 !important; color: #ededed !important; }
            .glass { background: rgba(18, 18, 18, 0.9) !important; border-bottom: 1px solid #222 !important; }
            
            #hero-overlay { background: #1a1a1a !important; }
            #logo-text, #hero-title, .product-card h3 { color: #fff !important; }
            
            .cat-btn.active { background: #fff !important; color: #000 !important; border-color: #fff !important; }
            .cat-btn { color: #888 !important; border-color: #333 !important; }
            .product-card { border: none !important; outline: none !important; }
            
            /* Correção da Sacola Ilegível */
            #cart-sidebar { background-color: #18181b !important; color: #ededed !important; border-left: 1px solid #333; }
            .cart-item-card { background-color: #27272a !important; color: #ededed !important; }
            #cart-footer { background-color: #1f1f22 !important; border-color: #333 !important; }
        }

        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .aspect-product { aspect-ratio: 3 / 4; object-fit: cover; }
        
        .fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .cat-btn.active { background: #111; color: white; border-color: #111; }
    </style>
</head>
<body>

    <script>
        // ==========================================
        // CONFIGURAÇÕES DO MODELO MESTRE
        // ==========================================
        const CONFIG = {
            nomeLoja: "The Boutique",
            nomeLojaInfantil: "The Little Boutique", // Nome que aparece no modo infantil
            whatsapp: "5547988973201", 
            
            Supabase_ProjectID: 'nhefdhzxzeddwjkzremz',
            Supabase_AnonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oZWZkaHp4emVkZHdqa3pyZW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5OTY0NTgsImV4cCI6MjA5MjU3MjQ1OH0.trb1SIXCmTCXwXfyne4k8AZN7CGnbhphEW-tADUVd7U'
        };
        // ==========================================

        const supabaseUrl = `https://${CONFIG.Supabase_ProjectID}.supabase.co`;
        const _supabase = supabase.createClient(supabaseUrl, CONFIG.Supabase_AnonKey);

        let currentMode = 'Adulto';
        let products = [];
        let cart = [];
        let currentCategory = 'Tudo';

        const colorDict = { 'azul': 'bg-blue-50', 'rosa': 'bg-pink-50', 'verde': 'bg-green-50', 'amarel': 'bg-yellow-50', 'pret': 'bg-gray-200', 'branc': 'bg-gray-50', 'vermelh': 'bg-red-50', 'rox': 'bg-purple-50', 'laranj': 'bg-orange-50' };

        async function fetchStore() {
            const { data, error } = await _supabase.from('produtos').select('*');
            if (!error) { products = data; renderStore(); }
        }
        window.onload = fetchStore;
    </script>

    <header class="fixed top-0 w-full z-40 glass h-16 flex items-center justify-between px-6 lg:px-12">
        <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="text-[10px] uppercase tracking-widest font-bold">Topo</button>
        <script>document.write(`<a href="#" class="text-xl font-bold font-serif-luxury uppercase tracking-tighter" id="logo-text">${CONFIG.nomeLoja}</a>`);</script>
        <button onclick="toggleCart()" class="relative">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span id="cart-badge" class="absolute -top-2 -right-2 bg-red-500 text-white text-[8px] font-bold w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
        </button>
    </header>

    <section id="hero-section" class="relative w-full flex flex-col items-center justify-center pt-24 pb-8">
        <div id="hero-overlay" class="absolute inset-0 bg-[#ebe7e0] transition-colors duration-1000"></div>
        <div class="relative z-10 text-center px-6 w-full">
            <h1 id="hero-title" class="text-5xl md:text-6xl font-serif-luxury mb-4">The Collection.</h1>
            
            <div class="bg-white/50 backdrop-blur p-1 rounded-full flex items-center relative w-56 h-10 cursor-pointer shadow-sm mx-auto mt-8 mb-12" onclick="toggleMode()">
                <div id="mode-slider" class="absolute left-1 top-1 bottom-1 w-[calc(50%-4px)] bg-[#2c2c2c] rounded-full transition-all duration-500"></div>
                <div class="flex-1 text-center z-10 text-[9px] font-bold uppercase text-white" id="txt-adulto">Adulto</div>
                <div class="flex-1 text-center z-10 text-[9px] font-bold uppercase text-gray-500" id="txt-infantil">Infantil</div>
            </div>
            
            <div class="max-w-screen-2xl mx-auto flex gap-2 overflow-x-auto cat-scroll justify-start md:justify-center px-2" id="cat-bar"></div>
        </div>
    </section>

    <main class="max-w-screen-2xl mx-auto px-6 lg:px-12 py-12 min-h-[40vh]">
        <div id="store-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-x-4 gap-y-12"></div>
    </main>

    <div id="modal-container"></div>

    <div id="cart-overlay" class="fixed inset-0 bg-black/50 z-50 hidden backdrop-blur-sm" onclick="toggleCart()"></div>
    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-full sm:w-96 bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-500 flex flex-col">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center" id="cart-header">
            <h2 class="text-sm font-bold uppercase tracking-widest">Sua Sacola</h2>
            <button onclick="toggleCart()" class="text-xl">✕</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 border-t bg-gray-50 space-y-4" id="cart-footer">
            <div class="flex justify-between font-bold"><span>Total</span><span id="cart-total">R$ 0,00</span></div>
            <button onclick="checkoutWhatsApp()" class="w-full bg-[#25D366] text-white py-4 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:scale-105 transition-transform">Finalizar no WhatsApp</button>
        </div>
    </div>

    <script>
        function toggleMode() {
            currentMode = currentMode === 'Adulto' ? 'Infantil' : 'Adulto';
            const isKids = currentMode === 'Infantil';
            
            // Controle do Slider
            document.getElementById('mode-slider').style.transform = isKids ? 'translateX(100%)' : 'translateX(0)';
            document.getElementById('mode-slider').style.backgroundColor = isKids ? '#ec4899' : '#2c2c2c';
            document.getElementById('txt-adulto').classList.toggle('text-white', !isKids);
            document.getElementById('txt-infantil').classList.toggle('text-white', isKids);
            
            // Controle do Título (Resolve o Bug 2)
            const logo = document.getElementById('logo-text');
            logo.innerText = isKids ? CONFIG.nomeLojaInfantil : CONFIG.nomeLoja;
            logo.className = isKids 
                ? 'text-xl font-bold font-kids text-pink-500 uppercase tracking-tighter' 
                : 'text-xl font-bold font-serif-luxury uppercase tracking-tighter text-inherit';

            currentCategory = 'Tudo';
            renderStore();
            if(isKids) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }

        function renderStore() {
            const grid = document.getElementById('store-grid');
            const filtered = products.filter(p => p.sector === currentMode);
            const categories = ['Tudo', ...new Set(filtered.map(p => p.category))];
            
            document.getElementById('cat-bar').innerHTML = categories.map(c => `
                <button onclick="currentCategory='${c}';renderStore()" class="cat-btn flex-shrink-0 px-4 py-1.5 rounded-full border text-[9px] font-bold uppercase tracking-widest transition-all ${currentCategory === c ? 'active' : 'text-gray-400 border-gray-200'}">${c}</button>
            `).join('');

            const final = currentCategory === 'Tudo' ? filtered : filtered.filter(p => p.category === currentCategory);
            grid.innerHTML = final.map(p => `
                <div class="group cursor-pointer fade-in product-card" onclick="openModal('${p.id}')">
                    <div class="overflow-hidden rounded-2xl bg-gray-100 dark:bg-zinc-800 relative">
                        ${p.tag ? `<span class="absolute top-3 right-3 bg-black text-white text-[8px] font-bold px-2 py-1 rounded-sm z-10">${p.tag}</span>` : ''}
                        <img src="${p.variants[0].image}" class="w-full aspect-product transition-transform duration-700 group-hover:scale-105" loading="lazy">
                    </div>
                    <div class="mt-4 text-center">
                        <h3 class="text-[11px] font-bold uppercase tracking-tight">${p.name}</h3>
                        <p class="text-[11px] font-serif-luxury italic opacity-50 mt-1">R$ ${p.price.toFixed(2)}</p>
                    </div>
                </div>`).join('');
        }

        let modalSelectedProduct, modalSelectedVariant, modalSelectedSize;

        window.openModal = (id) => {
            modalSelectedProduct = products.find(prod => prod.id == id);
            modalSelectedVariant = modalSelectedProduct.variants[0];
            modalSelectedSize = null;
            updateModalContent();
            document.body.style.overflow = 'hidden';
        };

        const updateModalContent = () => {
            const p = modalSelectedProduct; const v = modalSelectedVariant;
            const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const bgClass = isDark ? 'bg-[#1a1a1a]' : (colorDict[v.color.toLowerCase()] || 'bg-gray-50');
            
            document.getElementById('modal-container').innerHTML = `
                <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
                    <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="closeModal()"></div>
                    <div class="relative w-full max-w-5xl bg-white dark:bg-[#1f1f22] rounded-[2rem] overflow-hidden flex flex-col md:flex-row shadow-2xl fade-in">
                        <button onclick="closeModal()" class="absolute top-6 right-6 z-20 text-xl">✕</button>
                        <div class="md:w-1/2 min-h-[300px] md:min-h-[400px] flex items-center justify-center ${bgClass} transition-colors duration-500">
                            <img src="${v.image}" class="w-full h-full object-cover">
                        </div>
                        <div class="md:w-1/2 p-8 lg:p-12 flex flex-col justify-center text-left">
                            <h2 class="text-3xl font-serif-luxury mb-2 italic">${p.name}</h2>
                            <p class="text-xl font-bold mb-6 opacity-40">R$ ${p.price.toFixed(2)}</p>
                            <div class="mb-6"><p class="text-[9px] font-bold uppercase mb-3 opacity-40">Cor: ${v.color}</p>
                                <div class="flex flex-wrap gap-2">${p.variants.map((vItem, i) => `<button onclick="selectVariantInModal(${i})" class="px-4 py-2 border rounded-full text-[10px] font-bold uppercase ${vItem.color === v.color ? 'bg-black text-white dark:bg-white dark:text-black border-transparent' : 'border-gray-200 dark:border-gray-700'}">${vItem.color}</button>`).join('')}</div>
                            </div>
                            <div class="mb-8"><p class="text-[9px] font-bold uppercase mb-3 opacity-40">Tamanhos</p>
                                <div class="flex flex-wrap gap-2">${Object.entries(v.sizes).map(([s, q]) => `<button onclick="selectSizeInModal('${s}', ${q}, this)" class="size-btn px-4 py-2 border border-gray-200 dark:border-gray-700 rounded-lg text-[10px] font-bold ${q === 0 ? 'opacity-20 cursor-not-allowed' : 'hover:border-black'} ${modalSelectedSize === s ? 'bg-black text-white dark:bg-white dark:text-black' : ''}">${s}</button>`).join('')}</div>
                            </div>
                            <button id="modal-add-btn" onclick="confirmAddToCart()" class="w-full bg-black text-white py-4 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all opacity-30 cursor-not-allowed" disabled>Selecione um tamanho</button>
                        </div>
                    </div>
                </div>`;
            if(modalSelectedSize && v.sizes[modalSelectedSize] > 0) enableAddBtn();
        };

        window.selectVariantInModal = (vidx) => { modalSelectedVariant = modalSelectedProduct.variants[vidx]; updateModalContent(); };
        window.selectSizeInModal = (s, q, btn) => { if(q===0) return; modalSelectedSize = s; enableAddBtn(); updateModalContent(); };
        function enableAddBtn() { const b = document.getElementById('modal-add-btn'); if(b) { b.disabled = false; b.classList.remove('opacity-30', 'cursor-not-allowed'); b.innerText = 'Adicionar à Sacola'; } }
        window.confirmAddToCart = () => { cart.push({ name: modalSelectedProduct.name, price: modalSelectedProduct.price, color: modalSelectedVariant.color, size: modalSelectedSize, image: modalSelectedVariant.image }); updateBadge(); renderCart(); closeModal(); confetti({ particleCount: 50 }); };
        
        function renderCart() { 
            const cont = document.getElementById('cart-items'); 
            cont.innerHTML = cart.map((it, i) => `
                <div class="cart-item-card flex gap-4 items-center bg-gray-50 p-3 rounded-xl border border-gray-100 dark:border-gray-700">
                    <img src="${it.image}" class="w-12 h-16 object-cover rounded-lg">
                    <div class="flex-1 text-[10px] font-bold uppercase">
                        <p>${it.name}</p>
                        <p class="opacity-50 mt-1">${it.color} • ${it.size}</p>
                    </div>
                    <button onclick="cart.splice(${i},1);renderCart();updateBadge()" class="p-2 text-red-500 font-bold">✕</button>
                </div>`).join(''); 
            document.getElementById('cart-total').innerText = `R$ ${cart.reduce((s, i) => s + i.price, 0).toFixed(2)}`; 
        }

        window.updateBadge = () => { const b = document.getElementById('cart-badge'); b.innerText = cart.length; b.classList.toggle('hidden', cart.length === 0); };
        window.toggleCart = () => { const s = document.getElementById('cart-sidebar'); const o = document.getElementById('cart-overlay'); const op = s.classList.contains('translate-x-0'); s.classList.toggle('translate-x-0', !op); s.classList.toggle('translate-x-full', op); o.classList.toggle('hidden', op); };
        window.closeModal = () => { document.getElementById('modal-container').innerHTML = ''; document.body.style.overflow = 'auto'; };
        function checkoutWhatsApp() { let msg = `Olá! Encomenda:\n\n` + cart.map(i => `• ${i.name} (${i.color}/${i.size})`).join('\n'); window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(msg)}`); }
    </script>
</body>
</html>
