<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE BOUTIQUE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,600&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    
    <style>
        ::-webkit-scrollbar { display: none; }
        body { font-family: 'Inter', sans-serif; transition: all 0.5s ease; overflow-x: hidden; }
        .dark-mode { background-color: #121212; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .dark-mode .glass { background: rgba(18, 18, 18, 0.8); border-bottom: 1px solid #333; }
        .aspect-product { aspect-ratio: 3 / 4; object-fit: cover; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#fdfdfd] text-gray-900">

    <script>
        const SUPABASE_URL = 'https://nhefdhzxzeddwjkzremz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oZWZkaHp4emVkZHdqa3pyZW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5OTY0NTgsImV4cCI6MjA5MjU3MjQ1OH0.trb1SIXCmTCXwXfyne4k8AZN7CGnbhphEW-tADUVd7U';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentMode = 'Adulto';
        let isDarkMode = false;
        let products = [];
        let cart = [];

        async function fetchStore() {
            const { data, error } = await _supabase.from('produtos').select('*');
            if (!error) {
                products = data;
                renderStore();
            }
        }
        window.onload = fetchStore;
    </script>

    <header class="fixed top-0 w-full z-40 glass h-16 flex items-center justify-between px-6">
        <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="text-[9px] font-bold uppercase tracking-widest">Topo</button>
        <h1 class="font-serif italic text-xl" id="logo-text">The Boutique</h1>
        <div class="flex gap-5 items-center">
            <button onclick="toggleDarkMode()">☾</button>
            <button onclick="toggleCart()" class="relative">👜<span id="cart-badge" class="absolute -top-2 -right-2 bg-red-500 text-white text-[8px] rounded-full w-4 h-4 flex items-center justify-center hidden">0</span></button>
        </div>
    </header>

    <main class="pt-24 pb-20 px-6 max-w-7xl mx-auto text-center">
        <div class="flex justify-center mb-10">
            <div class="bg-gray-100 rounded-full p-1 flex w-52 relative cursor-pointer" onclick="toggleMode()">
                <div id="mode-slider" class="absolute inset-y-1 left-1 w-[calc(50%-4px)] bg-black rounded-full transition-all duration-300"></div>
                <div class="flex-1 text-center z-10 text-[9px] font-bold py-2.5 text-white" id="txt-adult">ADULTO</div>
                <div class="flex-1 text-center z-10 text-[9px] font-bold py-2.5 text-gray-400" id="txt-infant">INFANTIL</div>
            </div>
        </div>
        <div id="store-grid" class="grid grid-cols-2 md:grid-cols-4 gap-8"></div>
    </main>

    <div id="modal-container"></div>

    <script>
        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            document.getElementById('mode-slider').style.backgroundColor = isDarkMode ? '#fff' : '#000';
        }

        function toggleMode() {
            currentMode = currentMode === 'Adulto' ? 'Infantil' : 'Adulto';
            document.getElementById('mode-slider').style.transform = currentMode === 'Infantil' ? 'translateX(100%)' : 'translateX(0)';
            document.getElementById('txt-adult').classList.toggle('text-white', currentMode === 'Adulto');
            document.getElementById('txt-infant').classList.toggle('text-white', currentMode === 'Infantil');
            renderStore();
        }

        function renderStore() {
            const grid = document.getElementById('store-grid');
            const filtered = products.filter(p => p.sector === currentMode);
            grid.innerHTML = filtered.map(p => `
                <div class="cursor-pointer fade-in" onclick="openModal('${p.id}')">
                    <img src="${p.variants[0].image}" class="w-full aspect-product rounded-2xl mb-3 shadow-sm hover:scale-105 transition-transform">
                    <h3 class="text-[10px] font-bold uppercase">${p.name}</h3>
                    <p class="text-[10px] opacity-50">R$ ${p.price.toFixed(2)}</p>
                </div>
            `).join('');
        }

        window.openModal = (id) => {
            const p = products.find(prod => prod.id == id);
            const variant = p.variants[0];
            document.getElementById('modal-container').innerHTML = `
                <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
                    <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="closeModal()"></div>
                    <div class="relative w-full max-w-4xl bg-white dark:bg-zinc-900 rounded-[2rem] overflow-hidden flex flex-col md:flex-row">
                        <button onclick="closeModal()" class="absolute top-4 right-4 text-xl">✕</button>
                        <div class="md:w-1/2 p-4"><img src="${variant.image}" class="w-full h-full object-cover rounded-2xl"></div>
                        <div class="md:w-1/2 p-8 flex flex-col justify-center text-left">
                            <h2 class="text-3xl font-serif mb-2 italic">${p.name}</h2>
                            <p class="text-xl font-bold mb-4 text-gray-500">R$ ${p.price.toFixed(2)}</p>
                            <p class="text-xs opacity-60 mb-6">${p.description || ''}</p>
                            <div class="mb-4"><p class="text-[9px] font-bold uppercase mb-2">Selecione o Tamanho</p>
                                <div class="flex flex-wrap gap-2">
                                    ${Object.keys(variant.sizes).map(s => `<button onclick="addToCart('${p.name}', '${s}', ${p.price}, '${variant.image}')" class="px-4 py-2 border rounded-lg text-[10px] font-bold hover:bg-black hover:text-white transition-all">${s}</button>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            document.body.style.overflow = 'hidden';
        };

        window.addToCart = (name, size, price, image) => {
            if (navigator.vibrate) navigator.vibrate(50);
            cart.push({ name, size, price, image });
            document.getElementById('cart-badge').innerText = cart.length;
            document.getElementById('cart-badge').classList.remove('hidden');
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            closeModal();
            alert(`Adicionado: ${name} (Tam: ${size}) na sacola!`);
        };

        window.closeModal = () => { document.getElementById('modal-container').innerHTML = ''; document.body.style.overflow = 'auto'; };
        function toggleCart() {
            let msg = `Gostaria de encomendar:\n\n` + cart.map(i => `• ${i.name} (Tam: ${i.size})`).join('\n');
            window.open(`https://wa.me/5547988973201?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
