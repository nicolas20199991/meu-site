<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Tower | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #fff; }</style>
</head>
<body class="antialiased text-gray-900">

    <div id="login-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <h1 class="text-xl font-bold tracking-widest uppercase mb-8">Control Tower</h1>
        <input type="password" id="pin-input" placeholder="PIN" class="border border-gray-300 px-4 py-2 text-center tracking-[0.5em] focus:border-black outline-none rounded-lg mb-4 w-48">
        <button onclick="checkPIN()" class="bg-black text-white px-8 py-2 text-xs font-bold uppercase tracking-widest rounded-lg hover:bg-gray-800">Entrar</button>
        <p id="pin-error" class="text-red-500 text-xs mt-4 hidden">Acesso Negado.</p>
    </div>

    <header class="border-b border-gray-100 sticky top-0 z-30 bg-white">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <h1 class="text-sm font-semibold tracking-widest uppercase">The Control Tower</h1>
            <a href="index.html" target="_blank" class="text-xs font-medium uppercase text-gray-500 hover:text-black">Abrir Loja ↗</a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-12">
        <div class="bg-gray-50 p-8 rounded-xl mb-12 border border-gray-200 shadow-sm">
            <div class="flex justify-between items-center mb-6">
                <h2 id="form-title" class="text-xs font-bold uppercase tracking-widest text-gray-800">Cadastro de Peça</h2>
                <button id="btn-cancel-edit" type="button" onclick="cancelEdit()" class="hidden text-xs font-semibold text-red-500 hover:text-red-700 uppercase tracking-widest">Cancelar Edição</button>
            </div>
            
            <form id="product-form" onsubmit="saveProduct(event)" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-start">
                    <div class="md:col-span-2">
                        <label class="block text-xs text-gray-500 mb-2">Nome do Produto *</label>
                        <input type="text" id="p-name" required class="w-full border border-gray-200 px-4 py-2 text-sm focus:border-black outline-none rounded-lg">
                    </div>
                    
                    <div>
                        <label class="block text-xs text-gray-500 mb-2">Setor *</label>
                        <select id="p-sector" required class="w-full border border-gray-200 px-4 py-2 text-sm focus:border-black outline-none bg-white rounded-lg">
                            <option value="Adulto">Adulto</option>
                            <option value="Infantil">Infantil</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs text-gray-500 mb-2">Preço (R$) *</label>
                        <input type="number" id="p-price" step="0.01" required class="w-full border border-gray-200 px-4 py-2 text-sm focus:border-black outline-none rounded-lg">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-xs text-gray-500 mb-2">Categoria (Ex: Calças, Camisas) *</label>
                        <input type="text" id="p-category" required placeholder="Digite a categoria" class="w-full border border-gray-200 px-4 py-2 text-sm focus:border-black outline-none rounded-lg">
                    </div>

                    <div class="md:col-span-2 flex gap-4">
                        <div class="flex-1">
                            <label class="block text-xs text-gray-500 mb-2">Etiqueta</label>
                            <select id="p-tag" class="w-full border border-gray-200 px-4 py-2 text-sm focus:border-black outline-none bg-white rounded-lg">
                                <option value="">Nenhuma</option>
                                <option value="Novo">Novo</option>
                                <option value="Promoção">Promoção</option>
                                <option value="Mais Vendido">Mais Vendido</option>
                            </select>
                        </div>
                        <div class="flex items-center pt-6">
                            <label class="flex items-center gap-2 cursor-pointer text-xs font-semibold text-gray-600">
                                <input type="checkbox" id="p-tag-blink" class="w-4 h-4 text-black focus:ring-black border-gray-300 rounded">
                                Piscar
                            </label>
                        </div>
                    </div>

                    <div class="md:col-span-4">
                        <label class="block text-xs text-gray-500 mb-2">Descrição da Peça (Aparece em todas as cores)</label>
                        <textarea id="p-desc" rows="3" placeholder="Fale sobre o tecido, caimento..." class="w-full border border-gray-200 px-4 py-2 text-sm focus:border-black outline-none rounded-lg resize-none"></textarea>
                    </div>
                </div>
                
                <div class="border-t border-gray-200 pt-6 mt-6">
                    <div class="flex justify-between items-center mb-4">
                        <label class="block text-xs text-gray-800 font-bold uppercase tracking-widest">Variações de Cores & Estoque *</label>
                        <button type="button" onclick="addVariantBlock()" class="text-[10px] font-semibold uppercase tracking-widest border border-black px-3 py-1 rounded hover:bg-black hover:text-white transition-colors">+ Adicionar Cor</button>
                    </div>
                    <div id="variants-container" class="space-y-6"></div>
                </div>

                <div class="mt-8 border-t border-gray-200 pt-6">
                    <button id="btn-submit" type="submit" class="w-full bg-black text-white py-4 text-sm font-bold uppercase tracking-widest rounded-lg hover:bg-gray-800 transition-colors shadow-lg">Publicar Peça</button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm mb-12">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="py-4 pl-4 text-xs font-semibold uppercase text-gray-500">Imagem (Capa)</th>
                        <th class="py-4 text-xs font-semibold uppercase text-gray-500">Produto</th>
                        <th class="py-4 text-xs font-semibold uppercase text-gray-500">Setor / Categoria</th>
                        <th class="py-4 text-xs font-semibold uppercase text-gray-500">Estoque Total</th>
                        <th class="py-4 pr-4 text-right text-xs font-semibold uppercase text-gray-500">Ações</th>
                    </tr>
                </thead>
                <tbody id="admin-table" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 p-6 bg-gray-50 rounded-xl border border-gray-200 items-center justify-between">
            <div>
                <h3 class="text-xs font-bold uppercase tracking-widest text-gray-800">Sistema de Backup</h3>
                <p class="text-[10px] text-gray-500 mt-1">Salve seu estoque no PC para nunca perder dados.</p>
            </div>
            <div class="flex gap-2 w-full sm:w-auto">
                <button onclick="exportDB()" class="flex-1 sm:flex-none border border-gray-300 bg-white px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded hover:bg-gray-100">Exportar (Baixar)</button>
                <label class="flex-1 sm:flex-none border border-black bg-black text-white px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded hover:bg-gray-800 cursor-pointer text-center">
                    Importar Backup
                    <input type="file" accept=".json" onchange="importDB(event)" class="hidden">
                </label>
            </div>
        </div>

    </main>

    <script>
        function checkPIN() {
            const input = document.getElementById('pin-input').value;
            if (btoa(input) === 'MTIzNA==') { 
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('login-screen').style.display = 'none', 500);
            } else {
                document.getElementById('pin-error').classList.remove('hidden');
            }
        }
        document.getElementById('pin-input').addEventListener('keypress', function (e) { if (e.key === 'Enter') checkPIN(); });

        let products = [];
        let editingId = null;

        function loadDB() {
            try { products = JSON.parse(localStorage.getItem('the_boutique_db'))?.products || []; } 
            catch { products = []; }
            migrateOldData(); 
            renderTable();
        }

        function saveDB() {
            localStorage.setItem('the_boutique_db', JSON.stringify({ products }));
            renderTable();
        }

        // Q17: Backup e Restore
        function exportDB() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ products }));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "boutique_backup.json");
            dlAnchorElem.click();
        }

        function importDB(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(imported.products) {
                        products = imported.products;
                        saveDB();
                        alert("Estoque restaurado com sucesso!");
                    } else { alert("Arquivo inválido."); }
                } catch { alert("Erro ao ler o arquivo. Certifique-se que é o backup correto."); }
            };
            reader.readAsText(file);
        }

        function migrateOldData() {
            let changed = false;
            products.forEach(p => {
                if(!p.variants) {
                    p.variants = [{ id: crypto.randomUUID(), color: 'Padrão', image: p.image, sizes: p.stock || {'Único': 0} }];
                    delete p.image; delete p.stock;
                    p.category = p.category || 'Geral';
                    changed = true;
                }
            });
            if(changed) saveDB();
        }

        function addVariantBlock(data = null) {
            const vId = data ? data.id : crypto.randomUUID();
            const colorName = data ? data.color : '';
            const sizes = data ? data.sizes : { 'Único': 0 };
            
            const block = document.createElement('div');
            block.className = 'variant-block bg-white border border-gray-200 rounded-lg overflow-hidden';
            block.dataset.id = vId;
            
            let sizesHTML = '';
            Object.entries(sizes).forEach(([size, qty]) => {
                sizesHTML += `
                <div class="flex gap-2 size-row mt-2 items-center">
                    <input type="text" value="${size}" placeholder="Tam" class="w-1/3 border px-3 py-1.5 text-xs outline-none rounded v-size-name">
                    <input type="number" value="${qty}" min="0" placeholder="Qtd" class="w-1/3 border px-3 py-1.5 text-xs outline-none rounded v-size-qty">
                    <button type="button" onclick="this.parentElement.remove()" class="w-1/3 text-[10px] text-red-500 hover:text-red-700 font-semibold uppercase text-left pl-2">Remover</button>
                </div>`;
            });

            block.innerHTML = `
                <div class="bg-gray-50 px-4 py-2 border-b border-gray-200 flex justify-between items-center">
                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Detalhes da Cor</span>
                    <button type="button" onclick="this.closest('.variant-block').remove()" class="text-[10px] font-bold text-red-500 uppercase tracking-widest hover:text-red-700">✕ Excluir Cor</button>
                </div>
                <div class="p-4 grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] text-gray-500 uppercase tracking-widest mb-1">Nome da Cor *</label>
                        <input type="text" value="${colorName}" required placeholder="Ex: Azul Marinho" class="w-full border px-3 py-2 text-sm focus:border-black outline-none rounded v-color">
                        
                        <label class="block text-[10px] text-gray-500 uppercase tracking-widest mb-1 mt-4">Imagem da Cor *</label>
                        <input type="file" accept="image/*" ${data && data.image ? '' : 'required'} class="w-full text-xs file:mr-2 file:py-1.5 file:px-3 file:bg-gray-100 file:text-gray-700 file:font-semibold file:border-0 rounded v-image">
                        <input type="hidden" class="v-existing-image-data" value="${data && data.image ? data.image : ''}">
                    </div>
                    <div>
                        <div class="flex justify-between items-center border-b border-gray-100 pb-2 mb-2">
                            <label class="block text-[10px] text-gray-800 font-bold uppercase tracking-widest">Tamanhos desta cor</label>
                            <button type="button" onclick="addSizeToVariant(this)" class="text-[10px] font-bold text-blue-500 hover:text-blue-700 uppercase tracking-widest">+ Adicionar Tam</button>
                        </div>
                        <div class="v-sizes-container">${sizesHTML || `<div class="text-[10px] text-gray-400 mt-2 uppercase">Clique em + Adicionar Tam</div>`}</div>
                    </div>
                </div>
            `;
            document.getElementById('variants-container').appendChild(block);
        }

        window.addSizeToVariant = (btn) => {
            const container = btn.parentElement.nextElementSibling;
            if(container.innerHTML.includes('Clique em')) container.innerHTML = '';
            const div = document.createElement('div');
            div.className = 'flex gap-2 size-row mt-2 items-center';
            div.innerHTML = `
                <input type="text" placeholder="Tam" required class="w-1/3 border px-3 py-1.5 text-xs outline-none rounded v-size-name">
                <input type="number" value="0" min="0" required class="w-1/3 border px-3 py-1.5 text-xs outline-none rounded v-size-qty">
                <button type="button" onclick="this.parentElement.remove()" class="w-1/3 text-[10px] text-red-500 hover:text-red-700 font-semibold uppercase text-left pl-2">Remover</button>
            `;
            container.appendChild(div);
        }

        function resetForm() {
            document.getElementById('product-form').reset();
            document.getElementById('p-desc').value = '';
            document.getElementById('variants-container').innerHTML = '';
            addVariantBlock(); 
            editingId = null;
            document.getElementById('form-title').innerText = 'Cadastro de Peça';
            document.getElementById('btn-submit').innerText = 'Publicar Peça';
            document.getElementById('btn-submit').classList.remove('bg-blue-600');
            document.getElementById('btn-cancel-edit').classList.add('hidden');
        }

        function cancelEdit() { resetForm(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

        window.editProduct = (id) => {
            const p = products.find(prod => prod.id === id);
            if(!p) return;
            editingId = id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-sector').value = p.sector;
            document.getElementById('p-category').value = p.category || '';
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-tag').value = p.tag || ''; 
            document.getElementById('p-tag-blink').checked = p.tagBlink || false;
            document.getElementById('p-desc').value = p.description || '';
            
            document.getElementById('variants-container').innerHTML = '';
            p.variants.forEach(v => addVariantBlock(v));

            document.getElementById('form-title').innerText = 'Editando: ' + p.name;
            document.getElementById('btn-submit').innerText = 'Salvar Alterações';
            document.getElementById('btn-submit').classList.add('bg-blue-600');
            document.getElementById('btn-cancel-edit').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Q15: Compressor Dinâmico de Imagens via Canvas
        async function processImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; // Resolução ideal de vitrine mobile
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Converte para WEBP com 85% de qualidade (Economiza muito espaço)
                        resolve(canvas.toDataURL('image/webp', 0.85)); 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function saveProduct(e) {
            e.preventDefault();
            
            const variantBlocks = document.querySelectorAll('.variant-block');
            if(variantBlocks.length === 0) return alert("Adicione pelo menos uma Cor/Variação.");

            let processedVariants = [];

            for (let block of variantBlocks) {
                const color = block.querySelector('.v-color').value.trim();
                const fileInput = block.querySelector('.v-image');
                const existingImgData = block.querySelector('.v-existing-image-data').value;
                
                let imageBase64 = null;
                if (fileInput.files.length > 0) {
                    imageBase64 = await processImage(fileInput.files[0]);
                } else if (existingImgData) {
                    imageBase64 = existingImgData;
                }

                if(!imageBase64) return alert(`A cor ${color} precisa de uma imagem!`);

                const sizes = {};
                block.querySelectorAll('.size-row').forEach(row => {
                    const name = row.querySelector('.v-size-name').value.trim();
                    const qty = parseInt(row.querySelector('.v-size-qty').value, 10);
                    if (name) sizes[name] = qty;
                });

                if(Object.keys(sizes).length === 0) return alert(`A cor ${color} precisa de pelo menos um tamanho.`);

                processedVariants.push({ id: crypto.randomUUID(), color, image: imageBase64, sizes });
            }

            const pData = {
                name: document.getElementById('p-name').value,
                sector: document.getElementById('p-sector').value,
                category: document.getElementById('p-category').value.trim() || 'Geral',
                description: document.getElementById('p-desc').value.trim(),
                price: parseFloat(document.getElementById('p-price').value),
                tag: document.getElementById('p-tag').value,
                tagBlink: document.getElementById('p-tag-blink').checked,
                variants: processedVariants
            };

            if (editingId) {
                const idx = products.findIndex(p => p.id === editingId);
                products[idx] = { ...products[idx], ...pData };
            } else {
                products.unshift({ id: crypto.randomUUID(), ...pData });
            }
            
            saveDB();
            resetForm(); 
        }

        window.deleteProduct = (id) => {
            if(confirm("Remover peça permanentemente?")) {
                products = products.filter(p => p.id !== id);
                if(editingId === id) resetForm();
                saveDB();
            }
        };

        function renderTable() {
            document.getElementById('admin-table').innerHTML = products.map(p => {
                let totalStock = p.variants.reduce((acc, v) => acc + Object.values(v.sizes).reduce((a,b)=>a+b,0), 0);
                let coverImage = p.variants[0] ? p.variants[0].image : '';
                return `
                <tr class="hover:bg-gray-50 transition-colors text-xs border-b border-gray-100">
                    <td class="py-3 pl-4"><img src="${coverImage}" class="w-10 h-14 object-cover rounded shadow-sm"></td>
                    <td class="py-3 font-medium">
                        ${p.name}
                        <br><span class="text-[9px] text-gray-400 uppercase">${p.variants.length} Cores</span>
                    </td>
                    <td class="py-3 text-gray-500">${p.sector} / ${p.category}</td>
                    <td class="py-3 text-gray-500">${totalStock} un.</td>
                    <td class="py-3 pr-4 text-right">
                        <button onclick="editProduct('${p.id}')" class="font-bold text-blue-500 uppercase tracking-widest mr-4">Editar</button>
                        <button onclick="deleteProduct('${p.id}')" class="font-bold text-red-500 uppercase tracking-widest">Deletar</button>
                    </td>
                </tr>`;
            }).join('');
        }

        resetForm(); 
        loadDB();
    </script>
</body>
</html>
